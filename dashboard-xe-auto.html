        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --secondary: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --dark: #1f2937;
            --light: #f3f4f6;
            --border: #e5e7eb;
            --text: #1f2937;
            --bg: #ffffff;
        }

        html.dark-mode {
            --primary: #3b82f6;
            --secondary: #fbbf24;
            --danger: #f87171;
            --success: #34d399;
            --dark: #0f172a;
            --light: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        html.dark-mode body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: var(--bg);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header-title p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .theme-toggle {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 25px;
            background: var(--light);
            border-bottom: 1px solid var(--border);
            align-items: end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 0.9em;
        }

        .control-group select,
        .control-group input {
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9em;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            min-height: 500px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .card h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .car-item {
            padding: 12px;
            margin-bottom: 10px;
            background: var(--light);
            border-left: 4px solid var(--primary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .car-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(5px);
        }

        .car-item-name {
            font-weight: 600;
            font-size: 0.95em;
        }

        .car-item-type {
            font-size: 0.85em;
            opacity: 0.8;
            margin-top: 3px;
        }

        .car-item-price {
            font-size: 0.9em;
            margin-top: 5px;
            font-weight: 500;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 0.95em;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9em;
            border-bottom: 1px dotted var(--border);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 500;
            color: var(--text);
        }

        .detail-value {
            text-align: right;
            color: var(--primary);
            font-weight: 600;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .spec-item {
            background: var(--light);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .spec-label {
            font-weight: 600;
            color: var(--primary);
        }

        .spec-value {
            color: var(--text);
            margin-top: 2px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 15px;
        }

        .region-price-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .region-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--light);
            border-radius: 6px;
            font-size: 0.9em;
        }

        .region-name {
            font-weight: 600;
        }

        .region-price {
            color: var(--primary);
            font-weight: 600;
        }

        .dealer-item {
            padding: 10px;
            background: var(--light);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.85em;
        }

        .dealer-name {
            font-weight: 600;
            color: var(--primary);
        }

        .dealer-info {
            color: var(--text);
            margin-top: 3px;
        }

        .footer {
            background: var(--light);
            color: var(--text);
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.9em;
        }

        @media (max-width: 1000px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .safety-badge {
            display: inline-block;
            background: var(--success);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .adas-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .review-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .review-link:hover {
            text-decoration: underline;
        }

    <div class="container">
        <div class="header">
            <div class="header-title">
                <h1>🚗 Dashboard Xe Ô Tô 2026</h1>
                <p>Giá lăn bánh & Thông tin chi tiết - Cập nhật realtime</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="brand">🏢 Hãng Xe</label>
                <select id="brand" onchange="filterCars()">
                    <option value="">Tất cả hãng</option>
                </select>
            </div>
            <div class="control-group">
                <label for="region">📍 Khu Vực</label>
                <select id="region" onchange="filterCars()">
                    <option value="">Tất cả khu vực</option>
                    <option value="Hà Nội">Hà Nội (12%)</option>
                    <option value="Bắc Ninh">Bắc Ninh (10%)</option>
                    <option value="Hải Dương">Hải Dương (10%)</option>
                    <option value="Hải Phòng">Hải Phòng (10%)</option>
                    <option value="Quảng Ninh">Quảng Ninh (10%)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="seats">💺 Số Chỗ Ngồi</label>
                <select id="seats" onchange="filterCars()">
                    <option value="">Tất cả chỗ ngồi</option>
                    <option value="5">5 chỗ</option>
                    <option value="7">7 chỗ</option>
                </select>
            </div>
            <div class="control-group">
                <label for="engineType">⚡ Loại Động Cơ</label>
                <select id="engineType" onchange="filterCars()">
                    <option value="">Tất cả động cơ</option>
                    <option value="Xăng">Xăng</option>
                    <option value="EV">Xe điện (EV)</option>
                    <option value="HEV">Hybrid tự sạc (HEV)</option>
                    <option value="PHEV">Hybrid cắm sạc (PHEV)</option>
                    <option value="Dầu">Dầu (Diesel)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="maxPrice">💰 Giá Tối Đa (triệu VND)</label>
                <input type="number" id="maxPrice" placeholder="Nhập giá tối đa" onchange="filterCars()">
            </div>
            <button class="btn" onclick="updatePrices()">🔄 Cập Nhật Giá</button>
        </div>

        <div class="main-content">
            <div class="column">
                <div class="card">
                    <h3>📋 Danh Sách Xe</h3>
                    <div id="carList"></div>
                </div>
                <div class="card">
                    <h3>📊 So Sánh Giá Theo Khu Vực</h3>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="card">
                    <h3>💳 Chi Tiết Giá Lăn Bánh</h3>
                    <div id="priceDetails"></div>
                </div>
                <div class="card">
                    <h3>📋 Thông Số & Tính Năng</h3>
                    <div id="specsDetails"></div>
                </div>
                <div class="card">
                    <h3>🏪 Mạng Lưới Đại Lý</h3>
                    <div id="dealerDetails"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>💡 Dashboard Xe Ô Tô v2.0 | Cập nhật: Tháng 5/2026 | 📧 tuanvnaction@gmail.com</p>
        </div>
    </div>

                    Object.keys(res.data).forEach(carName => {

                displayAllCars();

        }

        function loadTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
            updateThemeButton();
        }

        function updateThemeButton() {
            const btn = document.querySelector('.theme-toggle');
            if (document.documentElement.classList.contains('dark-mode')) {
                btn.textContent = '☀️ Light Mode';
            } else {
                btn.textContent = '🌙 Dark Mode';
            }
        }

        function populateBrandDropdown() {
            const brandSelect = document.getElementById('brand');
            Object.keys(cars).forEach(brand => {
                const option = document.createElement('option');
                option.value = brand;
                option.textContent = brand;
                brandSelect.appendChild(option);
            });
        }

        function filterCars() {
            const selectedBrand = document.getElementById('brand').value;
            const selectedRegion = document.getElementById('region').value;
            const selectedSeats = document.getElementById('seats').value;
            const selectedEngine = document.getElementById('engineType').value;
            const maxPrice = parseInt(document.getElementById('maxPrice').value) || Infinity;

            let filteredCars = [];

            if (selectedBrand) {
                filteredCars = cars[selectedBrand] || [];
            } else {
                Object.values(cars).forEach(brandCars => {
                    filteredCars = filteredCars.concat(brandCars);
                });
            }

            // Filter by Seats
            if (selectedSeats) {
                filteredCars = filteredCars.filter(car => car.seats === parseInt(selectedSeats));
            }

            // Filter by Engine Type
            if (selectedEngine) {
                filteredCars = filteredCars.filter(car => car.engineType && car.engineType.includes(selectedEngine));
            }

            // Filter by price
            if (selectedRegion) {
                filteredCars = filteredCars.filter(car => {
                    const price = car.prices[selectedRegion] / 1000000;
                    return price <= maxPrice;
                });
            } else {
                filteredCars = filteredCars.filter(car => {
                    const minPrice = Math.min(...Object.values(car.prices)) / 1000000;
                    return minPrice <= maxPrice;
                });
            }

            displayCars(filteredCars);
        }

        function displayAllCars() {
            let allCars = [];
            Object.values(cars).forEach(brandCars => {
                allCars = allCars.concat(brandCars);
            });
            displayCars(allCars);
        }

        function displayCars(carList) {
            const carListEl = document.getElementById('carList');
            carListEl.innerHTML = '';

            carList.forEach(car => {
                const carEl = document.createElement('div');
                carEl.className = 'car-item';
                carEl.onclick = () => displayCarDetails(car);

                const selectedRegion = document.getElementById('region').value || 'Hà Nội';
                const price = car.prices[selectedRegion] / 1000000;

                let badgeBg = 'var(--primary)';
                if (car.engineType.includes('EV')) badgeBg = 'var(--success)';
                else if (car.engineType.includes('PHEV')) badgeBg = '#8b5cf6';
                else if (car.engineType.includes('HEV')) badgeBg = 'var(--secondary)';
                else if (car.engineType.includes('Dầu')) badgeBg = '#6b7280';

                carEl.innerHTML = `
                    <div class="car-item-name" style="display: flex; justify-content: space-between; align-items: center;">
                        <span>${car.name}</span>
                        <span style="font-size: 0.75em; padding: 2px 6px; border-radius: 4px; background: ${badgeBg}; color: white; font-weight: bold; margin-left: 5px;">${car.engineType}</span>
                    </div>
                    <div class="car-item-type">${car.type}</div>
                    <div class="car-item-price">💰 ${price.toFixed(0)} triệu (${selectedRegion})</div>
                `;
                carListEl.appendChild(carEl);
            });
        }

        function displayCarDetails(car) {
            currentCar = car;

            // Price Details
            const selectedRegion = document.getElementById('region').value || 'Hà Nội';
            const basePrice = car.prices[selectedRegion];
            const taxRate = selectedRegion === 'Hà Nội' ? 0.12 : 0.10;
            const tax = basePrice * taxRate;
            const registration = 5000000;
            const insurance = 2000000;
            const inspection = 1500000;
            const maintenance = 300000;
            const totalPrice = basePrice + tax + registration + insurance + inspection + maintenance;

            const priceDetailsEl = document.getElementById('priceDetails');
            priceDetailsEl.innerHTML = `
                <div class="detail-section">
                    <h4>💳 Giá Lăn Bánh Chi Tiết</h4>
                    <div class="detail-row">
                        <span class="detail-label">Giá Niêm Yết</span>
                        <span class="detail-value">${(basePrice / 1000000).toFixed(1)}M</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phí Trước Bạ (${(taxRate * 100).toFixed(0)}%)</span>
                        <span class="detail-value">${(tax / 1000000).toFixed(1)}M</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phí Đăng Ký Biển Số</span>
                        <span class="detail-value">${(registration / 1000000).toFixed(1)}M</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Bảo Hiểm TNDS</span>
                        <span class="detail-value">${(insurance / 1000000).toFixed(1)}M</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phí Đăng Kiểm</span>
                        <span class="detail-value">${(inspection / 1000000).toFixed(1)}M</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phí Bảo Trì Đường Bộ</span>
                        <span class="detail-value">${(maintenance / 1000000).toFixed(1)}M</span>
                    </div>
                    <div class="detail-row" style="border-top: 2px solid var(--primary); padding-top: 10px; margin-top: 10px;">
                        <span class="detail-label" style="font-size: 1.1em; font-weight: 700;">TỔNG GIÁ LĂN BÁNH</span>
                        <span class="detail-value" style="font-size: 1.1em; font-weight: 700;">${(totalPrice / 1000000).toFixed(1)}M</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h4>📍 So Sánh Giá Theo Khu Vực</h4>
                    <div class="region-price-list">
                        ${Object.entries(car.prices).map(([region, price]) => `
                            <div class="region-item">
                                <span class="region-name">${region}</span>
                                <span class="region-price">${(price / 1000000).toFixed(0)}M</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                ${car.variantPrices ? `
                <div class="detail-section">
                    <h4>💰 Giá Chi Tiết Theo Phiên Bản</h4>
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 0.85em;">
                            <thead>
                                <tr style="background: var(--light); border-bottom: 2px solid var(--border);">
                                    <th style="padding: 8px; text-align: left; font-weight: 600;">Phiên Bản</th>
                                    ${Object.keys(car.prices).map(region => `<th style="padding: 8px; text-align: right; font-weight: 600;">${region}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${car.variants.map(variant => `
                                    <tr style="border-bottom: 1px solid var(--border);">
                                        <td style="padding: 8px; font-weight: 500; color: var(--primary);">${variant}</td>
                                        ${Object.keys(car.prices).map(region => {
                                            const price = car.variantPrices[variant] && car.variantPrices[variant][region]
                                                ? (car.variantPrices[variant][region] / 1000000).toFixed(0)
                                                : '—';
                                            return `<td style="padding: 8px; text-align: right; color: var(--text);">${price}M</td>`;
                                        }).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
                ` : ''}
            `;

            // Specs Details
            const specsDetailsEl = document.getElementById('specsDetails');
            specsDetailsEl.innerHTML = `
                <div class="detail-section">
                    <h4>⚙️ Thông Số Động Cơ & Hiệu Suất</h4>
                    <div class="specs-grid">
                        <div class="spec-item">
                            <div class="spec-label">🔧 Động Cơ</div>
                            <div class="spec-value">${car.engine}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">⚡ Công Suất</div>
                            <div class="spec-value">${car.power}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">⛽ Tiêu Hao</div>
                            <div class="spec-value">${car.fuel}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">🔄 Hộp Số</div>
                            <div class="spec-value">${car.transmission}</div>
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <h4>🚗 Thông Số Khung Gầm & Hệ Thống Treo</h4>
                    <div style="font-size: 0.9em; line-height: 1.8;">
                        <div style="margin-bottom: 10px;"><strong>📐 Khung Gầm:</strong> ${car.chassis || 'Monocoque unibody'}</div>
                        <div style="margin-bottom: 10px;"><strong>🎯 Hệ Thống Treo:</strong> ${car.suspension || 'Front: MacPherson strut, Rear: Multi-link'}</div>
                        <div style="margin-bottom: 10px;"><strong>🎛️ Vô Lăng:</strong> ${car.steering || 'Electric power steering'}</div>
                        <div style="margin-bottom: 10px;"><strong>🛑 Phanh:</strong> ${car.brakes || 'Front: Ventilated disc, Rear: Disc'}</div>
                        <div style="margin-bottom: 10px;"><strong>🚘 Cầu:</strong> ${car.driveType || 'Front-wheel drive'}</div>
                    </div>
                </div>

                <div class="detail-section">
                    <h4>📏 Kích Thước & Trọng Lượng</h4>
                    <div style="font-size: 0.9em; line-height: 1.8;">
                        <div style="margin-bottom: 10px;"><strong>Kích Thước:</strong> ${car.dimensions || 'Liên hệ đại lý'}</div>
                        <div style="margin-bottom: 10px;"><strong>⚖️ Trọng Lượng:</strong> ${car.weight || 'Tuỳ phiên bản'}</div>
                        <div style="margin-bottom: 10px;"><strong>🛣️ Khoảng Sáng Gầm:</strong> ${car.groundClearance || 'Tuỳ phiên bản'}</div>
                        <div style="margin-bottom: 10px;"><strong>⛽ Dung Tích Bình Xăng:</strong> ${car.fuelTank || 'Tuỳ phiên bản'}</div>
                    </div>
                </div>

                <div class="detail-section">
                    <h4>🔒 Tính Năng An Toàn</h4>
                    <div style="margin-bottom: 10px;">
                        ${car.safety.map(item => `<span class="safety-badge">${item}</span>`).join('')}
                    </div>
                </div>

                <div class="detail-section">
                    <h4>🤖 Tính Năng ADAS</h4>
                    <div style="margin-bottom: 10px;">
                        ${car.adas.map(item => `<span class="adas-badge">${item}</span>`).join('')}
                    </div>
                </div>

                <div class="detail-section">
                    <h4>📦 Các Phiên Bản</h4>
                    <div style="font-size: 0.9em;">
                        ${car.variants.join(', ')}
                    </div>
                </div>

                <div class="detail-section">
                    <h4>🎁 Tiện Nghi</h4>
                    <div style="font-size: 0.9em;">
                        ${car.amenities.join(', ')}
                    </div>
                </div>

                ${car.colors ? `
                <div class="detail-section">
                    <h4>🎨 Màu Sắc Ngoại Thất</h4>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${car.colors.map(color => `<span class="safety-badge" style="background: var(--light); border: 1px solid var(--border); color: var(--text);">${color}</span>`).join('')}
                    </div>
                </div>
                ` : ''}

                <div class="detail-section">
                    <h4>📺 Review & Tài Liệu Tham Khảo</h4>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        ${car.review ? `<a href="${car.review}" target="_blank" class="review-link">🎬 Xem video review</a>` : ''}
                        ${car.reviews ? car.reviews.map(r => `<a href="${r.url}" target="_blank" class="review-link">📖 ${r.source}</a>`).join('') : ''}
                    </div>
                </div>
            `;

            // Update chart
            updatePriceChart();
        }

        function updatePriceChart() {
            if (!currentCar) return;

            const ctx = document.getElementById('priceChart');
            if (!ctx) return;

            const regions = Object.keys(currentCar.prices);
            const prices = regions.map(r => currentCar.prices[r] / 1000000);

            if (priceChart) {
                priceChart.destroy();
            }

            priceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: regions,
                    datasets: [{
                        label: 'Giá Niêm Yết (triệu VND)',
                        data: prices,
                        backgroundColor: [
                            'rgba(37, 99, 235, 0.8)',
                            'rgba(245, 158, 11, 0.8)',
                            'rgba(16, 185, 129, 0.8)',
                            'rgba(239, 68, 68, 0.8)',
                            'rgba(139, 92, 246, 0.8)'
                        ],
                        borderColor: [
                            '#2563eb',
                            '#f59e0b',
                            '#10b981',
                            '#ef4444',
                            '#8b5cf6'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: document.documentElement.classList.contains('dark-mode') ? '#f1f5f9' : '#1f2937'
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: document.documentElement.classList.contains('dark-mode') ? '#f1f5f9' : '#1f2937'
                            },
                            grid: {
                                color: document.documentElement.classList.contains('dark-mode') ? '#334155' : '#e5e7eb'
                            }
                        },
                        x: {
                            ticks: {
                                color: document.documentElement.classList.contains('dark-mode') ? '#f1f5f9' : '#1f2937'
                            },
                            grid: {
                                color: document.documentElement.classList.contains('dark-mode') ? '#334155' : '#e5e7eb'
                            }
                        }
                    }
                }
            });
        }

        function updatePrices() {
            alert('🔄 Đang cập nhật giá từ internet...\n\nNhấn "Cập Nhật Giá" trong dashboard sau khi API server chạy:\npython crawler_xe_oto.py api');
        }
    </script>
</body>
</html>
