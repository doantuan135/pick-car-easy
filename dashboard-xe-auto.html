        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --secondary: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --dark: #1f2937;
            --light: #f3f4f6;
            --border: #e5e7eb;
            --text: #1f2937;
            --bg: #ffffff;
        }

        html.dark-mode {
            --primary: #3b82f6;
            --secondary: #fbbf24;
            --danger: #f87171;
            --success: #34d399;
            --dark: #0f172a;
            --light: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        html.dark-mode body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: var(--bg);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header-title p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .theme-toggle {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 25px;
            background: var(--light);
            border-bottom: 1px solid var(--border);
            align-items: end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 0.9em;
        }

        .control-group select,
        .control-group input {
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9em;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            min-height: 500px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .card h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .car-item {
            padding: 12px;
            margin-bottom: 10px;
            background: var(--light);
            border-left: 4px solid var(--primary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .car-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(5px);
        }

        .car-item-name {
            font-weight: 600;
            font-size: 0.95em;
        }

        .car-item-type {
            font-size: 0.85em;
            opacity: 0.8;
            margin-top: 3px;
        }

        .car-item-price {
            font-size: 0.9em;
            margin-top: 5px;
            font-weight: 500;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 0.95em;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9em;
            border-bottom: 1px dotted var(--border);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 500;
            color: var(--text);
        }

        .detail-value {
            text-align: right;
            color: var(--primary);
            font-weight: 600;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .spec-item {
            background: var(--light);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .spec-label {
            font-weight: 600;
            color: var(--primary);
        }

        .spec-value {
            color: var(--text);
            margin-top: 2px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 15px;
        }

        .region-price-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .region-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--light);
            border-radius: 6px;
            font-size: 0.9em;
        }

        .region-name {
            font-weight: 600;
        }

        .region-price {
            color: var(--primary);
            font-weight: 600;
        }

        .dealer-item {
            padding: 10px;
            background: var(--light);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.85em;
        }

        .dealer-name {
            font-weight: 600;
            color: var(--primary);
        }

        .dealer-info {
            color: var(--text);
            margin-top: 3px;
        }

        .footer {
            background: var(--light);
            color: var(--text);
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.9em;
        }

        @media (max-width: 1000px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .safety-badge {
            display: inline-block;
            background: var(--success);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .adas-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .review-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .review-link:hover {
            text-decoration: underline;
        }

            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
        </div>

        <div class="controls">

            <div class="control-group">

            </div>
            <div class="control-group">
                <label for="maxPrice">💰 Giá Tối Đa (triệu VND)</label>
                <input type="number" id="maxPrice" placeholder="Nhập giá tối đa" onchange="filterCars()">
            </div>
            <button class="btn" onclick="updatePrices()">🔄 Cập Nhật Giá</button>
        </div>

        <div class="main-content">
            <div class="column">
                <div class="card">
                    <h3>📋 Danh Sách Xe</h3>
                    <div id="carList"></div>
                </div>
                <div class="card">
                    <h3>📊 So Sánh Giá Theo Khu Vực</h3>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="card">
                    <h3>💳 Chi Tiết Giá Lăn Bánh</h3>
                    <div id="priceDetails"></div>
                </div>
                <div class="card">
                    <h3>📋 Thông Số & Tính Năng</h3>
                    <div id="specsDetails"></div>
                </div>
                <div class="card">
                    <h3>🏪 Mạng Lưới Đại Lý</h3>
                    <div id="dealerDetails"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>💡 Dashboard Xe Ô Tô v2.0 | Cập nhật: Tháng 5/2026 | 📧 tuanvnaction@gmail.com</p>
        </div>

            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
            updateThemeButton();

            const btn = document.querySelector('.theme-toggle');
            if (document.documentElement.classList.contains('dark-mode')) {

            const brandSelect = document.getElementById('brand');

                option.value = brand;
                option.textContent = brand;
                brandSelect.appendChild(option);
            });
        }

        function filterCars() {
            const selectedBrand = document.getElementById('brand').value;
            const selectedRegion = document.getElementById('region').value;
            const maxPrice = parseInt(document.getElementById('maxPrice').value) || Infinity;

            let filteredCars = [];

            if (selectedBrand) {
                filteredCars = cars[selectedBrand] || [];
            } else {
                Object.values(cars).forEach(brandCars => {
                    filteredCars = filteredCars.concat(brandCars);
                });
            }

            // Filter by price
            if (selectedRegion) {
                filteredCars = filteredCars.filter(car => {
                    const price = car.prices[selectedRegion] / 1000000;
                    return price <= maxPrice;
                });
            } else {
                filteredCars = filteredCars.filter(car => {
                    const minPrice = Math.min(...Object.values(car.prices)) / 1000000;
                    return minPrice <= maxPrice;
                });
            }

            displayCars(filteredCars);
        }

        function displayAllCars() {
            let allCars = [];
            Object.values(cars).forEach(brandCars => {

            displayCars(allCars);
